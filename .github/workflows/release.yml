name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build & publish release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: |
          mkdir -p dist
          GOOS=linux   GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o dist/lo-linux-amd64   ./cmd/lo
          GOOS=linux   GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o dist/lo-linux-arm64   ./cmd/lo
          GOOS=darwin  GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o dist/lo-darwin-amd64  ./cmd/lo
          GOOS=darwin  GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o dist/lo-darwin-arm64  ./cmd/lo
          GOOS=windows GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o dist/lo-windows-amd64.exe ./cmd/lo
          GOOS=windows GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o dist/lo-windows-arm64.exe ./cmd/lo

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/lo-linux-amd64
            dist/lo-linux-arm64
            dist/lo-darwin-amd64
            dist/lo-darwin-arm64
            dist/lo-windows-amd64.exe
            dist/lo-windows-arm64.exe
            man/man1/lo.1
